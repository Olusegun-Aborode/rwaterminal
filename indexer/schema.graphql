# Envio entities (the event-history projection → Postgres tables).

# One row per Horizon Pool action (supply/withdraw/borrow/repay) — powers flows + active addresses.
type ReserveAction {
  id: ID! # txHash-logIndex
  kind: String! # 'supply' | 'withdraw' | 'borrow' | 'repay'
  reserve: String! # underlying asset address (lowercased)
  user: String!
  amount: BigInt!
  blockNumber: Int!
  timestamp: Int!
  txHash: String!
}

# Running per-reserve flow totals (cheap rollup for the chart).
type ReserveFlow {
  id: ID! # reserve address
  reserve: String!
  totalSupplied: BigInt!
  totalWithdrawn: BigInt!
  totalBorrowed: BigInt!
  totalRepaid: BigInt!
  actionCount: Int!
  lastBlock: Int!
}

# Per-(aToken, holder) balance, reconstructed from Mint/Burn/BalanceTransfer
# (RwaATokens are non-transferable — no free Transfer events). holder count =
# rows where balance > 0 grouped by token.
type Holding {
  id: ID! # aTokenAddr-holderAddr
  token: String!
  account: String!
  balance: BigInt!
  updatedBlock: Int!
}

# Per-aToken holder count rollup (cheap read for the Asset Holders panel).
type TokenHolders {
  id: ID! # aToken address
  token: String!
  holderCount: Int!
  lastBlock: Int!
}

# Time-stamped holder-count points (one per change) so holder count is queryable
# over time — powers the Holders trend line + 30d delta (last point per token per day).
type HolderPoint {
  id: ID! # token-block-account
  token: String!
  holderCount: Int!
  blockNumber: Int!
  timestamp: Int!
}
