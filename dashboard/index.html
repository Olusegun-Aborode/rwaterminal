<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RWA Terminal — Market Overview</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="dark" data-aesthetic="evolved" data-density="cozy">
  <script>(function(){try{var t=localStorage.getItem('theme');if(t)document.body.setAttribute('data-theme',t);}catch(e){}})();</script>
  <div id="root" class="shell">
    <div class="boot-splash"><img class="boot-splash-mark" src="assets/brand/datum-loop.webp" alt="Datum Labs" /></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="horizon.data.js"></script>

  <script type="text/babel" data-presets="env,react">
    const WORKER_URL = "https://rwa-terminal-worker.aborodeolusegun.workers.dev";
    const money = (n) => n==null ? '—' : (Math.abs(n)>=1e9?'$'+(n/1e9).toFixed(2)+'B':Math.abs(n)>=1e6?'$'+(n/1e6).toFixed(1)+'M':Math.abs(n)>=1e3?'$'+(n/1e3).toFixed(0)+'K':'$'+Number(n).toFixed(2));
    const CLASS_COLORS = { 'US Treasuries':'var(--blue)', 'Private Credit (CLO)':'var(--purple)', 'Private Credit':'var(--orange)', 'Crypto Carry':'var(--cyan)', 'Stablecoin':'var(--green)', 'Other':'var(--fg-dim)' };

    function KPI({label, value, sub, subColor, big}) {
      return (
        <div className="panel" style={{padding:'18px 20px'}}>
          <div className="metric-label">{label}</div>
          <div className="metric-value" style={{fontSize:big?32:26,marginTop:6}}>{value}</div>
          {sub && <div className="metric-footer" style={{marginTop:6,color:subColor||'var(--fg-muted)'}}>{sub}</div>}
        </div>
      );
    }
    function Flag({tone, children}) {
      const c={red:['var(--red-soft)','var(--red)'],yellow:['var(--orange-soft)','var(--orange)'],green:['var(--green-soft)','var(--green)'],muted:['var(--bg-2)','var(--fg-muted)']}[tone||'muted'];
      return <span className="risk-pill" style={{background:c[0],color:c[1]}}>{children}</span>;
    }
    function Bars({rows, total, fmt, colorFor}) {
      const max = Math.max(...rows.map(r=>r.aum), 1);
      return (
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {rows.map((r,i)=>(
            <div key={i}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
                <span style={{color:'var(--fg)'}}>{r.name} <span style={{color:'var(--fg-dim)',fontFamily:'var(--font-mono)',fontSize:10}}>· {r.count}</span></span>
                <span className="mono" style={{color:'var(--fg-muted)'}}>{fmt(r.aum)} <span style={{color:'var(--fg-dim)'}}>· {total?Math.round(r.aum/total*100):0}%</span></span>
              </div>
              <div style={{height:8,background:'var(--bg-2)',borderRadius:4,overflow:'hidden'}}>
                <div style={{height:'100%',width:(r.aum/max*100)+'%',background:colorFor(r.name),borderRadius:4}} />
              </div>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [D, setD] = React.useState(window.HORIZON_DATA);
      React.useEffect(() => {
        if (!WORKER_URL) return; let alive=true;
        const load = () => fetch(WORKER_URL.replace(/\/$/,'')+'/api/snapshot').then(r=>r.json()).then(j=>{ if(alive && j && j.totals) setD(j); }).catch(()=>{});
        load(); const id=setInterval(load,60000); return ()=>{alive=false;clearInterval(id);};
      }, []);
      const T = D.totals;
      const asOf = new Date(D.fetched_at*1000);
      const grade = T.grade; const gradeColor = {A:'var(--green)',B:'var(--green)',C:'var(--yellow)',D:'var(--red)'}[grade];
      const reserves = D.reserves;
      const assets = [...reserves].sort((a,b)=>(b.asset_aum||0)-(a.asset_aum||0));
      const rwaClasses = (T.by_class||[]).filter(c=>c.name!=='Stablecoin');
      const issuers = (T.by_issuer||[]).filter(i=>i.aum>0);
      const issuerCount = new Set(reserves.filter(r=>!r.is_stable).map(r=>r.issuer)).size;

      return (
        <>
          <header className="topbar">
            <div className="topbar-left">
              <div className="topbar-brand"><img src="assets/brand/datum-loop.webp" style={{width:22,height:22,borderRadius:4,objectFit:'cover'}}/><span className="topbar-brand-name">datum<span style={{color:'var(--orange)'}}>labs</span></span></div>
              <span className="topbar-terminal"><span className="prompt">❯</span><span>rwa-terminal · market overview</span></span>
            </div>
            <div className="topbar-right"><span className="live-pill"><span className="dot"/>LIVE · block {D.block.toLocaleString()}</span></div>
          </header>

          <aside className="sidebar">
            <div className="sidebar-section-label">Market</div>
            <a className="nav-item active"><span className="nav-icon">◆</span><span>Overview</span></a>
            <a className="nav-item"><span className="nav-icon">◷</span><span>By Asset Class</span><span className="nav-count">{rwaClasses.length}</span></a>
            <a className="nav-item"><span className="nav-icon">§</span><span>By Issuer</span><span className="nav-count">{issuerCount}</span></a>
            <div className="sidebar-section-label">Venues</div>
            <a className="nav-item" href="horizon.html"><span className="nav-icon">▦</span><span>Aave Horizon</span><span className="nav-count">{T.reserve_count}</span></a>
            <a className="nav-item" style={{opacity:.5}}><span className="nav-icon">▦</span><span>Morpho</span><span className="nav-count">P2</span></a>
            <div style={{marginTop:'auto',padding:'16px 10px 8px',borderTop:'1px solid var(--border)'}}>
              <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--fg-dim)',letterSpacing:'0.1em'}}>BUILT WITH</div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-muted)',marginTop:3}}>@datumlabs/<span style={{color:'var(--orange)'}}>dashboard-kit</span></div>
            </div>
          </aside>

          <main className="main">
            <div className="page-header">
              <div>
                <h1 className="page-title">RWA Market — Overview</h1>
                <div className="page-subtitle">Lens: <b>asset-level AUM</b> (issuer-reported where available, else supply × NAV) · stablecoins split out · Phase 1: Horizon-sourced · as of block {D.block.toLocaleString()} · <span className="ok">●</span> {asOf.toUTCString()}</div>
              </div>
            </div>

            <div className="panel" style={{padding:'12px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
              <span style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.1em',color:'var(--fg-muted)'}}>DATA QUALITY</span>
              <span style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:18,color:gradeColor}}>{grade}</span>
              {T.unknown_count>0 ? <Flag tone="red">{T.unknown_count} unmapped</Flag> : <Flag tone="green">all {T.reserve_count} assets mapped</Flag>}
              <Flag tone="muted">{T.nav_value_only} NAV value-only</Flag>
              <span style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontSize:10,color:'var(--fg-dim)'}}>AUM ≠ venue-supplied · enumerated via getReservesList</span>
            </div>

            <div className="grid grid-4" style={{marginBottom:16}}>
              <KPI big label="Tokenized RWA AUM" value={money(T.rwa_aum)} sub={`${T.rwa_count} funds · non-stablecoin`} />
              <KPI label="Stablecoins" value={money(T.stablecoin_aum)} sub="full circulating supply" />
              <KPI label="Issuers" value={issuerCount} sub="across the RWA funds" />
              <KPI label="On Aave Horizon" value={money(T.horizon_supplied_usd)} sub="venue lens · supplied" subColor="var(--fg-dim)" />
            </div>

            <div className="grid grid-2" style={{marginBottom:16}}>
              <div className="panel">
                <div className="panel-header"><span className="panel-title"><span className="bullet">●</span> Composition by Asset Class</span><span className="panel-badge">RWA · ex-stablecoin</span></div>
                <div className="panel-body"><Bars rows={rwaClasses} total={T.rwa_aum} fmt={money} colorFor={n=>CLASS_COLORS[n]||'var(--fg-dim)'} /></div>
              </div>
              <div className="panel">
                <div className="panel-header"><span className="panel-title"><span className="bullet">●</span> By Issuer</span><span className="panel-badge">RWA AUM</span></div>
                <div className="panel-body"><Bars rows={issuers} total={T.rwa_aum+T.stablecoin_aum} fmt={money} colorFor={()=>'var(--orange)'} /></div>
              </div>
            </div>

            <div className="panel">
              <div className="panel-header"><span className="panel-title"><span className="bullet">●</span> Assets</span><span className="panel-badge">FUND AUM · "ON HORIZON" IS A VENUE TAG</span></div>
              <div className="panel-body flush">
                <table className="datatable">
                  <thead><tr><th>Asset</th><th>Class</th><th>Issuer</th><th className="num">NAV</th><th className="num">Fund AUM</th><th className="num">On Horizon</th><th>Venue</th></tr></thead>
                  <tbody>
                    {assets.map((r,i)=>(
                      <tr key={i} onClick={()=>{window.location.href='horizon.html';}}>
                        <td><div className="asset"><div className="asset-icon" style={{background:CLASS_COLORS[r.asset_class]||'var(--fg-muted)'}}>{(r.label||'?').slice(0,2)}</div><div><div className="asset-name">{r.label}</div><div className="asset-sub">{r.symbol_onchain}</div></div></div></td>
                        <td><span className="risk-pill" style={{background:'var(--bg-2)',color:CLASS_COLORS[r.asset_class]||'var(--fg-muted)'}}>{r.asset_class}</span></td>
                        <td style={{color:'var(--fg-muted)',fontSize:12}}>{typeof r.issuer==='string'?r.issuer:''}</td>
                        <td className="num">{r.nav_value!=null?'$'+Number(r.nav_value).toLocaleString(undefined,{maximumFractionDigits:r.nav_value>100?2:4}):'—'}</td>
                        <td className="num" style={{fontWeight:600}}>{money(r.asset_aum)}</td>
                        <td className="num" style={{color:(r.supplied_usd>0)?'var(--fg)':'var(--fg-dim)'}}>{r.supplied_usd>0?money(r.supplied_usd):'0 on Horizon'}</td>
                        <td>{r.supplied_usd>0?<Flag tone="green">HORIZON</Flag>:<Flag tone="muted">not on Horizon</Flag>}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </main>

          <footer className="statusbar">
            <div className="left"><span style={{color:'var(--orange)'}}>❯</span><span>rwa-terminal</span><span className="sep">│</span><span>source: <span style={{color:'var(--green)'}}>onchain + issuer APIs</span></span><span className="sep">│</span><span>Phase 1</span></div>
            <div className="right"><span>block #{D.block.toLocaleString()}</span><span className="sep">│</span><span>Powered by DatumLabs</span></div>
          </footer>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
