<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RWA Terminal — Market Overview</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="light" data-aesthetic="institutional" data-density="cozy">
  <script>(function(){try{var t=localStorage.getItem('theme');if(t)document.body.setAttribute('data-theme',t);}catch(e){}})();</script>
  <div id="root" class="shell">
    <div class="boot-splash"><img class="boot-splash-mark" src="assets/brand/datum-loop.webp" alt="Datum Labs" /></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="horizon.data.js"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="widgets.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;
    const WORKER_URL = "https://rwa-terminal-worker.aborodeolusegun.workers.dev";
    const CLASS_COLORS = { 'US Treasuries':'#3B5FE0', 'Private Credit (CLO)':'#9B4AE0', 'Private Credit':'#FF6B35', 'Crypto Carry':'#0090B2', 'Stablecoin':'#0F9D58', 'Other':'#9599A1' };
    const navUSD = (v) => v==null ? '—' : window.fmtUSD(v, v>=1e9?2:1);

    function ThemeToggle() {
      const [theme, setTheme] = useState(document.body.getAttribute('data-theme')||'dark');
      const set = (t) => { document.body.setAttribute('data-theme', t); try{localStorage.setItem('theme',t)}catch(e){} setTheme(t); };
      return (
        <div className="theme-toggle" role="tablist" aria-label="Theme">
          <button className={theme==='light'?'active':''} onClick={()=>set('light')} title="Light"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg></button>
          <button className={theme==='dark'?'active':''} onClick={()=>set('dark')} title="Dark"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        </div>
      );
    }

    function Metric({label, value, sub, spark, sparkColor}) {
      return (
        <div className="panel" style={{padding:'18px 20px',display:'flex',flexDirection:'column',gap:4}}>
          <div className="metric-label">{label}</div>
          <div className="metric-value" style={{fontSize:28}}>{value}</div>
          <div className="metric-footer">{sub}</div>
          {spark && spark.length>1 && <div style={{marginTop:6}}><Sparkline values={spark} color={sparkColor||'var(--orange)'} width={150} height={30} /></div>}
        </div>
      );
    }

    function AssetDrawer({asset, onClose}) {
      const r = asset;
      const row = (k,v) => <div style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}><span style={{color:'var(--fg-muted)',fontSize:12}}>{k}</span><span className="mono" style={{fontSize:12,textAlign:'right'}}>{v}</span></div>;
      return (
        <ExpandModal open={!!r} title={r ? `${r.label} — ${r.asset_class}` : ''} onClose={onClose}>
          {r && <div style={{padding:'4px 4px 12px'}}>
            <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:14}}>
              <div className="asset-icon" style={{width:38,height:38,background:CLASS_COLORS[r.asset_class]}}>{(r.label||'?').slice(0,2)}</div>
              <div><div style={{fontSize:18,fontWeight:600}}>{r.label}</div><div className="asset-sub">{r.symbol_onchain} · {typeof r.issuer==='string'?r.issuer:''}</div></div>
              <div style={{marginLeft:'auto'}}>{r.nav_state==='fresh'?<DataQualityBadge level="ok" label="NAV FRESH"/>:r.nav_state==='value_only'?<DataQualityBadge level="degraded" label="VALUE-ONLY"/>:r.nav_state==='stale'?<DataQualityBadge level="broken" label="STALE"/>:<DataQualityBadge level="degraded" label={r.nav_state||'—'}/>}</div>
            </div>
            <div className="grid grid-2" style={{gap:24}}>
              <div>
                {row('Asset class', r.asset_class)}
                {row('Issuer', typeof r.issuer==='string'?r.issuer:'—')}
                {row('Fund AUM', navUSD(r.asset_aum))}
                {row('NAV', r.nav_value!=null?'$'+Number(r.nav_value).toLocaleString(undefined,{maximumFractionDigits:r.nav_value>100?2:4}):'—')}
                {row('Token supply', r.token_total_supply!=null?window.fmtNum(r.token_total_supply,2):'—')}
              </div>
              <div>
                {row('On Aave Horizon', r.supplied_usd>0?navUSD(r.supplied_usd):'0 — not deposited here')}
                {row('LTV (Horizon)', r.ltv_pct!=null?r.ltv_pct+'%':'—')}
                {row('Liq. threshold', r.liq_threshold_pct!=null?r.liq_threshold_pct+'%':'—')}
                {row('NAV freshness', r.nav_state==='value_only'?'off-chain (issuer)':(r.nav_state||'—'))}
                {row('Contract', (r.address||'').slice(0,10)+'…')}
              </div>
            </div>
            <div style={{marginTop:14}}><a className="dropdown-trigger" href="horizon.html">View on Aave Horizon →</a></div>
          </div>}
        </ExpandModal>
      );
    }

    function App() {
      const [D, setD] = useState(window.HORIZON_DATA);
      const [view, setView] = useState('overview');
      const [sel, setSel] = useState(null);
      const [metric, setMetric] = useState('value');
      const [hist, setHist] = useState(null);
      useEffect(() => {
        if (!WORKER_URL) return; let alive=true; const base = WORKER_URL.replace(/\/$/,'');
        const load = () => fetch(base+'/api/snapshot').then(r=>r.json()).then(j=>{ if(alive && j && j.totals) setD(j); }).catch(()=>{});
        load(); const id=setInterval(load,60000);
        fetch(base+'/api/history').then(r=>r.json()).then(j=>{ if(alive) setHist(j.points||[]); }).catch(()=>{});
        return ()=>{alive=false;clearInterval(id);};
      }, []);
      const T = D.totals;
      const reserves = D.reserves;
      const grade = T.grade;
      const qLevel = grade==='A'||grade==='B' ? 'ok' : grade==='C' ? 'degraded' : 'broken';
      const groupBy = (key, filt) => { const g={}; reserves.filter(filt).forEach(r=>{const k=r[key]||'Other';(g[k]=g[k]||{name:k,value:0,count:0});g[k].value+=r.asset_aum||0;g[k].count++;}); return Object.values(g).sort((a,b)=>b.value-a.value); };
      const byClass = groupBy('asset_class', r=>!r.is_stable);
      const byIssuer = groupBy('issuer', r=>!r.is_stable);
      const issuerCount = byIssuer.length;
      const treeItems = byClass.map(c=>({id:c.name,name:c.name,value:c.value/1e6,color:CLASS_COLORS[c.name]||'#9599A1'}));
      const assetsSorted = [...reserves].sort((a,b)=>(b.asset_aum||0)-(a.asset_aum||0));
      // Total RWA Value over time, stacked by category (from /api/history)
      const classOf = {}; reserves.forEach(r=>{ if(r.address) classOf[r.address.toLowerCase()]=r.asset_class; });
      const rwaClassNames = [...new Set(reserves.filter(r=>!r.is_stable).map(r=>r.asset_class))];
      // one pass over daily history -> day -> class -> AUM, carrying each fund's last value forward over gap days
      const days = hist ? [...new Set(hist.map(p=>p.hr))].sort() : [];
      const byDayClass = {};
      if (hist) {
        const ptsByDay = {}; hist.forEach(p=>{ (ptsByDay[p.hr]=ptsByDay[p.hr]||[]).push(p); });
        const lastByAddr = {};
        days.forEach(d=>{
          (ptsByDay[d]||[]).forEach(p=>{ lastByAddr[(p.addr||'').toLowerCase()]=Number(p.aum); });
          const cm={}; Object.entries(lastByAddr).forEach(([addr,aum])=>{ const cls=classOf[addr]; if(cls) cm[cls]=(cm[cls]||0)+aum; });
          byDayClass[d]=cm;
        });
      }
      const areaSeries = (hist && days.length>1) ? rwaClassNames.map(cls=>({
        name: cls, color: CLASS_COLORS[cls]||'#9599A1', values: days.map(d=> (byDayClass[d]&&byDayClass[d][cls])||0)
      })).filter(s=>s.values.some(v=>v>0)) : [];
      const areaLabels = days.map(s=>{ const dt=new Date(s+'T00:00:00Z'); return dt.toLocaleDateString('en-US',{month:'short',year:'2-digit'}); });
      const METRIC_LABELS = {value:'Total RWA Value', holders:'Asset Holders', active:'Active Addresses', transfer:'Transfer Volume'};

      const NAV = [
        {sec:'Market', items:[
          {id:'overview', icon:'◆', name:'Overview'},
          {id:'by-class', icon:'◷', name:'By Asset Class', count:byClass.length},
          {id:'by-issuer', icon:'§', name:'By Issuer', count:issuerCount},
        ]},
      ];

      const AssetTable = ({rows, groupLabel}) => (
        <table className="datatable">
          <thead><tr><th>Asset</th><th>Class</th><th>Issuer</th><th className="num">NAV</th><th className="num">Fund AUM</th><th className="num">On Horizon</th></tr></thead>
          <tbody>
            {rows.map((r,i)=>(
              <tr key={i} onClick={()=>setSel(r)}>
                <td><div className="asset"><div className="asset-icon" style={{background:CLASS_COLORS[r.asset_class]||'var(--fg-muted)'}}>{(r.label||'?').slice(0,2)}</div><div><div className="asset-name">{r.label}</div><div className="asset-sub">{r.symbol_onchain}</div></div></div></td>
                <td><span className="risk-pill" style={{background:'var(--bg-2)',color:CLASS_COLORS[r.asset_class]||'var(--fg-muted)'}}>{r.asset_class}</span></td>
                <td style={{color:'var(--fg-muted)',fontSize:12}}>{typeof r.issuer==='string'?r.issuer:''}</td>
                <td className="num">{r.nav_value!=null?'$'+Number(r.nav_value).toLocaleString(undefined,{maximumFractionDigits:r.nav_value>100?2:4}):'—'}</td>
                <td className="num" style={{fontWeight:600}}>{navUSD(r.asset_aum)}</td>
                <td className="num" style={{color:r.supplied_usd>0?'var(--fg)':'var(--fg-dim)'}}>{r.supplied_usd>0?navUSD(r.supplied_usd):'0 on Horizon'}</td>
              </tr>
            ))}
          </tbody>
        </table>
      );

      return (
        <>
          <header className="topbar">
            <div className="topbar-left">
              <div className="topbar-brand"><img src="assets/brand/datum-loop.webp" style={{width:22,height:22,borderRadius:4,objectFit:'cover'}}/><span className="topbar-brand-name">datum<span style={{color:'var(--orange)'}}>labs</span></span></div>
              <span className="topbar-terminal"><span className="prompt">❯</span><span>rwa-terminal · market overview</span></span>
            </div>
            <div className="topbar-right">
              <DataSourceBadge source="onchain + issuer APIs" lastUpdated={D.fetched_at*1000} tone="green" />
              <span className="live-pill"><span className="dot"/>LIVE · block {D.block.toLocaleString()}</span>
              <ThemeToggle />
            </div>
          </header>

          <aside className="sidebar">
            {NAV.map(s=>(<div key={s.sec}>
              <div className="sidebar-section-label">{s.sec}</div>
              {s.items.map(it=>(
                <a key={it.id} className={`nav-item ${view===it.id?'active':''}`} onClick={()=>setView(it.id)}>
                  <span className="nav-icon">{it.icon}</span><span>{it.name}</span>{it.count!=null && <span className="nav-count">{it.count}</span>}
                </a>
              ))}
            </div>))}
            <div className="sidebar-section-label">Venues</div>
            <a className="nav-item" href="horizon.html"><span className="nav-icon">▦</span><span>Aave Horizon</span><span className="nav-count">{T.reserve_count}</span></a>
            <a className="nav-item" style={{opacity:.5}}><span className="nav-icon">▦</span><span>Morpho</span><span className="nav-count">P2</span></a>
            <div className="sidebar-section-label">Workspace</div>
            <a className="nav-item" href="methodology.html"><span className="nav-icon">𝑓</span><span>Methodology</span></a>
            <div style={{marginTop:'auto',padding:'16px 10px 8px',borderTop:'1px solid var(--border)'}}>
              <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--fg-dim)',letterSpacing:'0.1em'}}>BUILT WITH</div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-muted)',marginTop:3}}>@datumlabs/<span style={{color:'var(--orange)'}}>dashboard-kit</span></div>
            </div>
          </aside>

          <main className="main">
            <div className="page-header">
              <div>
                <h1 className="page-title">{view==='overview'?'RWA Market — Overview':view==='by-class'?'By Asset Class':'By Issuer'}</h1>
                <div className="page-subtitle">Lens: <b>asset-level AUM</b> (issuer-reported / supply × NAV) · stablecoins split out · <b>Horizon-sourced</b> (not the full market) · as of block {D.block.toLocaleString()}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <DataQualityBadge level={qLevel} label={`Grade ${grade}`} tooltip={`${T.unknown_count} unmapped · ${T.nav_value_only} value-only NAV`} />
                {T.reconciliation && <span className="risk-pill" title={`Our Horizon TVL ${navUSD(T.horizon_supplied_usd)} vs DefiLlama ${navUSD(T.reconciliation.defillama_supplied_usd)} (${T.reconciliation.gap_pct>0?'+':''}${T.reconciliation.gap_pct}%) · Tier-3 cross-check`} style={{cursor:'help',background:T.reconciliation.status==='verified'?'var(--green-soft)':'var(--orange-soft)',color:T.reconciliation.status==='verified'?'var(--green)':'var(--orange)'}}>{T.reconciliation.status==='verified'?'✓ Verified':'⚠ Degraded'} vs DefiLlama</span>}
                <span className="risk-pill" style={{background:'var(--bg-2)',color:'var(--fg-muted)'}}>Scope · Horizon</span>
              </div>
            </div>

            <div className="grid grid-4" style={{marginBottom:16}}>
              <Metric label="RWA AUM · Horizon-sourced" value={navUSD(T.rwa_aum)} sub={`${T.rwa_count} funds · not the full market`} />
              <Metric label="Stablecoins" value={navUSD(T.stablecoin_aum)} sub="full circulating supply" />
              <Metric label="Issuers" value={issuerCount} sub="across the RWA funds" />
              <Metric label="On Aave Horizon" value={navUSD(T.horizon_supplied_usd)} sub="venue lens · supplied" />
            </div>

            {view==='overview' && <>
              <div className="panel" style={{marginBottom:16}}>
                <div className="panel-header">
                  <span className="panel-title"><span className="bullet">●</span> {METRIC_LABELS[metric]}<span style={{color:'var(--fg-dim)',fontWeight:400,marginLeft:8,textTransform:'none',letterSpacing:0}}>· by RWA category</span></span>
                  <div className="time-range">
                    {['value','holders','active','transfer'].map(m=>(
                      <button key={m} className={metric===m?'active':''} onClick={()=>setMetric(m)}>{ {value:'Value',holders:'Holders',active:'Active Addrs',transfer:'Transfer Vol'}[m] }</button>
                    ))}
                  </div>
                </div>
                <div className="panel-body">
                  {metric==='value'
                    ? (areaSeries.length
                        ? <AreaChart series={areaSeries} stacked width={900} height={280} labels={areaLabels} />
                        : <div style={{height:280,display:'grid',placeItems:'center',textAlign:'center'}}><div><div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-muted)'}}>History accumulating — a snapshot lands every 5 min</div><div style={{fontSize:11,color:'var(--fg-dim)',marginTop:6}}>The stacked-area trend fills in as points arrive ({days.length} so far).</div></div></div>)
                    : <div style={{height:280,display:'grid',placeItems:'center',textAlign:'center'}}><div><div style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--fg-muted)'}}>{METRIC_LABELS[metric]} — requires the event indexer</div><div style={{fontSize:11,color:'var(--fg-dim)',marginTop:8,maxWidth:380}}>Holders / active addresses / transfer volume are event-level data. Phase 2 wires an Envio indexer over Horizon's Mint / Burn / BalanceTransfer events.</div></div></div>}
                </div>
              </div>

              <div className="grid grid-2" style={{marginBottom:16}}>
                <div className="panel">
                  <div className="panel-header"><span className="panel-title"><span className="bullet">●</span> Asset Holders</span><span className="panel-badge">PER FUND</span></div>
                  <div className="panel-body" style={{minHeight:236,display:'grid',placeItems:'center',textAlign:'center'}}>
                    <div><div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-muted)'}}>Holder counts require the event indexer</div><div style={{fontSize:11,color:'var(--fg-dim)',marginTop:6,maxWidth:300}}>Phase 2 — Envio over Mint/Burn/BalanceTransfer (RWA aTokens emit no free Transfer events).</div></div>
                  </div>
                </div>
                <div className="panel">
                  <div className="panel-header"><span className="panel-title"><span className="bullet">●</span> By Issuer</span><span className="panel-badge">RWA AUM</span></div>
                  <div className="panel-body" style={{minHeight:236}}><Leaderboard items={byIssuer.map(i=>({name:i.name,value:i.value,dot:'var(--orange)'}))} /></div>
                </div>
              </div>
            </>}

            {view==='by-class' && <>
              <div className="panel" style={{marginBottom:16}}>
                <div className="panel-header"><span className="panel-title"><span className="bullet">●</span> Asset Classes</span><span className="panel-badge">{byClass.length} CLASSES · RWA AUM</span></div>
                <div className="panel-body"><Treemap items={treeItems} width={900} height={300} /></div>
              </div>
              {byClass.map(c=>(
                <div className="panel" key={c.name} style={{marginBottom:16}}>
                  <div className="panel-header"><span className="panel-title"><span className="bullet" style={{color:CLASS_COLORS[c.name]}}>●</span> {c.name}</span><span className="panel-badge">{navUSD(c.value)} · {c.count} {c.count>1?'funds':'fund'}</span></div>
                  <div className="panel-body flush"><AssetTable rows={assetsSorted.filter(r=>r.asset_class===c.name)} /></div>
                </div>
              ))}
            </>}

            {view==='by-issuer' && <>
              <div className="panel" style={{marginBottom:16}}>
                <div className="panel-header"><span className="panel-title"><span className="bullet">●</span> Issuers by RWA AUM</span><span className="panel-badge">{issuerCount} ISSUERS</span></div>
                <div className="panel-body"><Leaderboard items={byIssuer.map(i=>({name:i.name+'  ('+i.count+')',value:i.value,dot:'var(--orange)'}))} /></div>
              </div>
              {byIssuer.map(iss=>(
                <div className="panel" key={iss.name} style={{marginBottom:16}}>
                  <div className="panel-header"><span className="panel-title"><span className="bullet">●</span> {iss.name}</span><span className="panel-badge">{navUSD(iss.value)} · {iss.count} {iss.count>1?'funds':'fund'}</span></div>
                  <div className="panel-body flush"><AssetTable rows={assetsSorted.filter(r=>r.issuer===iss.name)} /></div>
                </div>
              ))}
            </>}
          </main>

          <footer className="statusbar">
            <div className="left"><span style={{color:'var(--orange)'}}>❯</span><span>rwa-terminal</span><span className="sep">│</span><span>source: <span style={{color:'var(--green)'}}>onchain + issuer APIs</span></span><span className="sep">│</span><span>Phase 1</span></div>
            <div className="right"><span>block #{D.block.toLocaleString()}</span><span className="sep">│</span><span>Powered by DatumLabs</span></div>
          </footer>

          <AssetDrawer asset={sel} onClose={()=>setSel(null)} />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <div id="splash" class="boot-splash" style="z-index:99999"><img class="boot-splash-mark" src="assets/brand/datum-loop.webp" alt="Datum Labs" /></div>
  <script>(function(){var s=document.getElementById('splash');if(!s)return;if(sessionStorage.getItem('rwaSplash')){s.remove();return;}sessionStorage.setItem('rwaSplash','1');setTimeout(function(){s.style.transition='opacity .45s ease';s.style.opacity='0';setTimeout(function(){s.remove();},450);},5000);})();</script>
</body>
</html>
