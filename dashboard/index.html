<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RWA Terminal: Market Overview</title>
  <link rel="stylesheet" href="styles.css?v=p7-thesis" />
  <style>
    /* Mobile chart/table optimisation */
    @media (max-width: 760px) {
      .col-hide-sm { display: none !important; }          /* drop constant Chains/Asset-Type cols on mobile */
      .datatable th, .datatable td { padding-left: 10px; padding-right: 10px; }
      .panel-body { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    }
  </style>
</head>
<body data-theme="light" data-aesthetic="institutional" data-density="cozy">
  <script>(function(){try{var t=localStorage.getItem('theme');if(t)document.body.setAttribute('data-theme',t);}catch(e){}})();</script>
  <div id="root" class="shell">
    <div class="boot-splash"><img class="boot-splash-mark" src="assets/brand/datum-loop.webp" alt="Datum Labs" /></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="horizon.data.js"></script>
  <script type="text/babel" src="charts.jsx?v=p4-donut"></script>
  <script type="text/babel" src="widgets.jsx?v=p5-mobile"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;
    const WORKER_URL = "https://rwa-terminal-worker.aborodeolusegun.workers.dev";
    const CLASS_COLORS = { 'US Treasuries':'#3B5FE0', 'Private Credit (CLO)':'#9B4AE0', 'Private Credit':'#FF6B35', 'Crypto Carry':'#0090B2', 'Stablecoin':'#0F9D58', 'Bonds':'#00A3A3', 'Govt Bonds (EU)':'#5B8DEF', 'Commodities (Gold)':'#D4A017', 'Other':'#9599A1' };
    const navUSD = (v) => v==null ? 'n/a' : window.fmtUSD(v, v>=1e9?2:1);
    const pct = (n,d=1) => n==null ? 'n/a' : (n*100).toFixed(d)+'%';
    const shortAddr = (a) => a ? a.slice(0,6)+'…'+a.slice(-4) : 'n/a';

    // Measure a container so charts render at the panel's true pixel width (fills desktop)
    function useElementWidth(initial) {
      const ref = React.useRef(null);
      const [w, setW] = useState(initial || 900);
      React.useLayoutEffect(() => {
        const el = ref.current; if(!el) return;
        const measure = () => { const cw = Math.floor(el.clientWidth); if(cw>0) setW(cw); };
        measure();
        let ro; if(window.ResizeObserver){ ro = new ResizeObserver(measure); ro.observe(el); }
        window.addEventListener('resize', measure);
        return () => { if(ro) ro.disconnect(); window.removeEventListener('resize', measure); };
      }, []);
      return [ref, w];
    }

    function ThemeToggle() {
      const [theme, setTheme] = useState(document.body.getAttribute('data-theme')||'dark');
      const set = (t) => { document.body.setAttribute('data-theme', t); try{localStorage.setItem('theme',t)}catch(e){} setTheme(t); };
      return (
        <div className="theme-toggle" role="tablist" aria-label="Theme">
          <button className={theme==='light'?'active':''} onClick={()=>set('light')} title="Light"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg></button>
          <button className={theme==='dark'?'active':''} onClick={()=>set('dark')} title="Dark"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        </div>
      );
    }

    function Delta({pct}) {
      if (pct==null || !isFinite(pct)) return null;
      const up = pct>=0;
      return <span className={`delta ${up?'up':'down'}`}>{up?'▲':'▼'} {Math.abs(pct).toFixed(2)}%<span style={{color:'var(--fg-dim)',fontWeight:400,marginLeft:4}}>30d</span></span>;
    }
    function Metric({label, value, sub, delta}) {
      const hasDelta = delta!=null && isFinite(delta);
      return (
        <div className="panel" style={{padding:'18px 20px',display:'flex',flexDirection:'column',gap:5}}>
          <div className="metric-label">{label}</div>
          <div className="metric-value" style={{fontSize:28}}>{value}</div>
          <div className="metric-footer">{hasDelta ? <Delta pct={delta}/> : <span>{sub}</span>}</div>
        </div>
      );
    }

    function AssetDrawer({asset, onClose}) {
      const r = asset;
      const row = (k,v) => <div style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}><span style={{color:'var(--fg-muted)',fontSize:12}}>{k}</span><span className="mono" style={{fontSize:12,textAlign:'right'}}>{v}</span></div>;
      return (
        <ExpandModal open={!!r} title={r ? `${r.label}, ${r.asset_class}` : ''} onClose={onClose}>
          {r && <div style={{padding:'4px 4px 12px'}}>
            <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:14}}>
              <div className="asset-icon" style={{width:38,height:38,background:CLASS_COLORS[r.asset_class]}}>{(r.label||'?').slice(0,2)}</div>
              <div><div style={{fontSize:18,fontWeight:600}}>{r.label}</div><div className="asset-sub">{r.symbol_onchain} · {typeof r.issuer==='string'?r.issuer:''}</div></div>
              <div style={{marginLeft:'auto'}}>{r.nav_state==='fresh'?<DataQualityBadge level="ok" label="NAV FRESH"/>:r.nav_state==='value_only'?<DataQualityBadge level="degraded" label="VALUE-ONLY"/>:r.nav_state==='stale'?<DataQualityBadge level="broken" label="STALE"/>:<DataQualityBadge level="degraded" label={r.nav_state||'n/a'}/>}</div>
            </div>
            <div className="grid grid-2" style={{gap:24}}>
              <div>
                {row('Asset class', r.asset_class)}
                {row('Issuer', typeof r.issuer==='string'?r.issuer:'n/a')}
                {row('Fund AUM', navUSD(r.asset_aum))}
                {row('NAV', r.nav_value!=null?'$'+Number(r.nav_value).toLocaleString(undefined,{maximumFractionDigits:r.nav_value>100?2:4}):'n/a')}
                {row('Token supply', r.token_total_supply!=null?window.fmtNum(r.token_total_supply,2):'n/a')}
              </div>
              <div>
                {row('On Aave Horizon', r.supplied_usd>0?navUSD(r.supplied_usd):'0, not deposited here')}
                {row('LTV (Horizon)', r.ltv_pct!=null?r.ltv_pct+'%':'n/a')}
                {row('Liq. threshold', r.liq_threshold_pct!=null?r.liq_threshold_pct+'%':'n/a')}
                {row('NAV freshness', r.nav_state==='value_only'?'off-chain (issuer)':(r.nav_state||'n/a'))}
                {row('Contract', (r.address||'').slice(0,10)+'…')}
              </div>
            </div>
            <div style={{marginTop:14}}><a className="dropdown-trigger" href="horizon.html">View on Aave Horizon →</a></div>
          </div>}
        </ExpandModal>
      );
    }

    function App() {
      const [D, setD] = useState(window.HORIZON_DATA);
      const [view, setViewRaw] = useState(()=>{ try{ const h=(location.hash||'').replace('#',''); return ['overview','risk','activity'].includes(h)?h:'overview'; }catch(e){ return 'overview'; } });
      const setView = (v)=>{ setViewRaw(v); try{ history.replaceState(null,'', v==='overview'?(location.pathname+location.search):('#'+v)); window.scrollTo(0,0); }catch(e){} };
      React.useEffect(()=>{ const onHash=()=>{ const h=(location.hash||'').replace('#',''); setViewRaw(['overview','risk','activity'].includes(h)?h:'overview'); }; window.addEventListener('hashchange',onHash); return ()=>window.removeEventListener('hashchange',onHash); },[]);
      const [sel, setSel] = useState(null);
      const [metric, setMetric] = useState('value');
      const [hist, setHist] = useState(null);
      const [events, setEvents] = useState(null);
      const [usage, setUsage] = useState(null);
      const [flows, setFlows] = useState(null);
      const [mkt, setMkt] = useState(null);
      const [holdersHist, setHoldersHist] = useState(null);
      const [activeHist, setActiveHist] = useState(null);
      const [morpho, setMorpho] = useState(null);
      const [deltas, setDeltas] = useState(null);
      const [includeStables, setIncludeStables] = useState(false);
      const [sortKey, setSortKey] = useState('total_value');
      const [sortDir, setSortDir] = useState('desc');
      const [filterClass, setFilterClass] = useState(null);
      const [filterVenue, setFilterVenue] = useState(null);
      const chartRef = React.useRef(null);
      const [chartWrapRef, CW] = useElementWidth(900);
      const CH = CW>=1100 ? 360 : CW>=760 ? 320 : 280;
      useEffect(() => {
        if (!WORKER_URL) return; let alive=true; const base = WORKER_URL.replace(/\/$/,'');
        const load = () => {
          fetch(base+'/api/snapshot').then(r=>r.json()).then(j=>{ if(alive && j && j.totals) setD(j); }).catch(()=>{});
          fetch(base+'/api/events').then(r=>r.json()).then(j=>{ if(alive && j && j.by_asset) setEvents(j); }).catch(()=>{});
        };
        load(); const id=setInterval(load,60000);
        fetch(base+'/api/history').then(r=>r.json()).then(j=>{ if(alive) setHist(j.points||[]); }).catch(()=>{});
        fetch(base+'/api/flows').then(r=>r.json()).then(j=>{ if(alive && j && j.daily) setFlows(j); }).catch(()=>{});
        fetch(base+'/api/market-history').then(r=>r.json()).then(j=>{ if(alive && j) setMkt(j.points||[]); }).catch(()=>{});
        fetch(base+'/api/holders-history').then(r=>r.json()).then(j=>{ if(alive && j) setHoldersHist(j.points||[]); }).catch(()=>{});
        fetch(base+'/api/active-history').then(r=>r.json()).then(j=>{ if(alive && j) setActiveHist(j.points||[]); }).catch(()=>{});
        fetch(base+'/api/morpho').then(r=>r.json()).then(j=>{ if(alive && j && j.assets) setMorpho(j); }).catch(()=>{});
        fetch(base+'/api/deltas').then(r=>r.json()).then(j=>{ if(alive && j && j.deltas) setDeltas(j.deltas); }).catch(()=>{});
        fetch(base+'/api/usage').then(r=>r.json()).then(j=>{ if(alive && j && j.tokens) setUsage(j); }).catch(()=>{});
        return ()=>{alive=false;clearInterval(id);};
      }, []);
      const T = D.totals;
      const reserves = D.reserves;
      const grade = T.grade;
      const qLevel = grade==='A'||grade==='B' ? 'ok' : grade==='C' ? 'degraded' : 'broken';
      const groupBy = (key, filt) => { const g={}; reserves.filter(filt).forEach(r=>{const k=r[key]||'Other';(g[k]=g[k]||{name:k,value:0,count:0});g[k].value+=r.asset_aum||0;g[k].count++;}); return Object.values(g).sort((a,b)=>b.value-a.value); };
      const byClass = groupBy('asset_class', r=>!r.is_stable);
      const byIssuer = groupBy('issuer', r=>!r.is_stable);
      const issuerCount = byIssuer.length;
      const treeItems = byClass.map(c=>({id:c.name,name:c.name,value:c.value/1e6,color:CLASS_COLORS[c.name]||'#9599A1'}));
      // ── Cross-venue DEPLOYMENT lens (Way 1): value locked per venue, additive across venues ──
      const morphoAssets = (morpho && morpho.assets) ? morpho.assets : [];
      const morphoMarkets = (morpho && morpho.collateral_markets) ? morpho.collateral_markets : [];
      const positions = [
        ...reserves.filter(r=>!r.is_stable && (r.supplied_usd||0)>0).map(r=>({venue:'Aave Horizon', label:r.label, asset_class:r.asset_class, issuer:typeof r.issuer==='string'?r.issuer:'?', usd:r.supplied_usd})),
        ...morphoAssets.map(a=>({venue:'Morpho', label:a.label, asset_class:a.asset_class, issuer:a.issuer, usd:a.morpho_usd})),
      ];
      const groupPos = (key) => { const g={}; positions.forEach(p=>{const k=p[key]||'Other';(g[k]=g[k]||{name:k,value:0,count:0});g[k].value+=p.usd||0;g[k].count++;}); return Object.values(g).sort((a,b)=>b.value-a.value); };
      const byClassDep = groupPos('asset_class');
      const byIssuerDep = groupPos('issuer');
      const byVenue = groupPos('venue');
      const deployedTotal = positions.reduce((s,p)=>s+(p.usd||0),0);
      const morphoTotal = morpho ? (morpho.total_usd||0) : 0;
      const treeItemsDep = byClassDep.map(c=>({id:c.name,name:c.name,value:c.value/1e6,color:CLASS_COLORS[c.name]||'#9599A1'}));
      // ── All Assets master table (asset universe by full AUM = Total Value) ──
      const dAt = (addr) => (deltas && addr && deltas[String(addr).toLowerCase()]) || null;
      const allAssetsRaw = [
        ...reserves.map(r=>{const dl=dAt(r.address); return { name:r.label, symbol:r.symbol_onchain, issuer:typeof r.issuer==='string'?r.issuer:'?', platform:'Aave Horizon', asset_class:r.asset_class, total_value:r.asset_aum||0, chg7d:dl?dl.chg7d:null, chg30d:dl?dl.chg30d:null, chains:'Ethereum', asset_type:'Distributed', is_stable:r.is_stable };}),
        ...morphoAssets.map(a=>{const dl=dAt(a.address); return { name:a.label, symbol:a.label, issuer:a.issuer, platform:'Morpho', asset_class:a.asset_class, total_value:(a.aum||a.morpho_usd||0), chg7d:dl?dl.chg7d:null, chg30d:dl?dl.chg30d:null, chains:'Ethereum', asset_type:'Distributed', is_stable:false };}),
      ];
      const allAssetsSorted = allAssetsRaw.filter(a=>includeStables || !a.is_stable).sort((a,b)=>{
        const av=a[sortKey], bv=b[sortKey];
        if(typeof av==='string') return sortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
        return sortDir==='asc'?(av-bv):(bv-av);
      });
      const setSort = (k) => { if(sortKey===k){ setSortDir(d=>d==='asc'?'desc':'asc'); } else { setSortKey(k); setSortDir(['total_value'].includes(k)?'desc':'asc'); } };
      const sortArrow = (k) => sortKey===k ? (sortDir==='asc'?' ▲':' ▼') : '';
      const allAssetsFiltered = allAssetsSorted.filter(a=>(!filterClass||a.asset_class===filterClass) && (!filterVenue||a.platform===filterVenue));
      const allAssetsTotal = allAssetsFiltered.reduce((s,a)=>s+a.total_value,0);
      const classChips = [...new Set(allAssetsRaw.filter(a=>includeStables||!a.is_stable).map(a=>a.asset_class))];
      const deltaCell = (v) => v==null
        ? <span style={{color:'var(--fg-dim)'}}>n/a</span>
        : <span style={{color:v>=0?'var(--green)':'var(--red)',fontFamily:'var(--font-mono)',fontSize:12}}>{(v>=0?'+':'')+(v*100).toFixed(1)+'%'}</span>;
      // composition pies (deployment lens)
      const pieByClass = byClassDep.map(c=>({name:c.name,value:c.value,color:CLASS_COLORS[c.name]||'#9599A1'}));
      const pieByVenue = byVenue.map(v=>({name:v.name,value:v.value,color:v.name==='Morpho'?'#9B4AE0':'#3B5FE0'}));
      const ASSET_PALETTE = ['#3B5FE0','#FF6B35','#0090B2','#9B4AE0','#0F9D58','#D4A017','#00A3A3','#5B8DEF','#E0518A','#7A5CFF','#FF9F1C','#2EC4B6','#9599A1'];
      const pieByAsset = [...positions].sort((a,b)=>b.usd-a.usd).slice(0,9).map((p,i)=>({name:`${p.label} · ${p.venue.replace('Aave ','')}`,value:p.usd,color:ASSET_PALETTE[i%ASSET_PALETTE.length]}));
      const assetsSorted = [...reserves].sort((a,b)=>(b.asset_aum||0)-(a.asset_aum||0));
      // Total RWA Value over time, stacked by category (from /api/history)
      const classOf = {}; reserves.forEach(r=>{ if(r.address) classOf[r.address.toLowerCase()]=r.asset_class; });
      const rwaClassNames = [...new Set(reserves.filter(r=>!r.is_stable).map(r=>r.asset_class))];
      // one pass over daily history -> day -> class -> AUM, carrying each fund's last value forward over gap days
      const days = hist ? [...new Set(hist.map(p=>p.hr))].sort() : [];
      const byDayClass = {};
      if (hist) {
        const ptsByDay = {}; hist.forEach(p=>{ (ptsByDay[p.hr]=ptsByDay[p.hr]||[]).push(p); });
        const lastByAddr = {};
        days.forEach(d=>{
          (ptsByDay[d]||[]).forEach(p=>{ lastByAddr[(p.addr||'').toLowerCase()]=Number(p.aum); });
          const cm={}; Object.entries(lastByAddr).forEach(([addr,aum])=>{ const cls=classOf[addr]; if(cls) cm[cls]=(cm[cls]||0)+aum; });
          byDayClass[d]=cm;
        });
      }
      const areaSeries = (hist && days.length>1) ? rwaClassNames.map(cls=>({
        name: cls, color: CLASS_COLORS[cls]||'#9599A1', values: days.map(d=> (byDayClass[d]&&byDayClass[d][cls])||0)
      })).filter(s=>s.values.some(v=>v>0)) : [];
      const areaLabels = days.map(s=>{ const dt=new Date(s+'T00:00:00Z'); return dt.toLocaleDateString('en-US',{month:'short',year:'2-digit'}); });
      // 30-day deltas for the hero metrics (from the carry-forward daily history)
      const sumCls = (o, cls) => cls.reduce((s,c)=>s+((o&&o[c])||0),0);
      const delta30 = (cls) => {
        if(!hist || days.length<2) return null;
        const last=days[days.length-1];
        const target=new Date(new Date(last+'T00:00:00Z').getTime()-30*864e5).toISOString().slice(0,10);
        let prev=null; for(const d of days){ if(d<=target) prev=d; else break; }
        if(!prev) return null; // not enough history for a true 30d delta -> show the subline instead
        const cur=sumCls(byDayClass[last],cls), old=sumCls(byDayClass[prev],cls);
        return old>0 ? (cur-old)/old*100 : null;
      };
      const rwaDelta = delta30(rwaClassNames);
      const stableDelta = delta30(['Stablecoin']);
      // 30d deltas for market totals only the indexer/snapshot tracks (accrue from /api/market-history)
      const mkt30 = (field) => {
        if(!mkt || mkt.length<2) return null;
        const last=mkt[mkt.length-1];
        const target=new Date(new Date(last.d+'T00:00:00Z').getTime()-30*864e5).toISOString().slice(0,10);
        let prev=null; for(const p of mkt){ if(p.d<=target) prev=p; else break; }
        if(!prev) return null;
        const cur=Number(last[field]), old=Number(prev[field]);
        return (old>0 && isFinite(cur)) ? (cur-old)/old*100 : null;
      };
      const horizonDelta = mkt30('horizon_supplied_usd');
      const Badges = (
        <>
          <DataQualityBadge level={qLevel} label={`Grade ${grade}`} tooltip={`${T.unknown_count} unmapped · ${T.nav_value_only} value-only NAV`} />
          {T.reconciliation && <span className="risk-pill" title={`Our Horizon TVL ${navUSD(T.horizon_supplied_usd)} vs DefiLlama ${navUSD(T.reconciliation.defillama_supplied_usd)} (${T.reconciliation.gap_pct>0?'+':''}${T.reconciliation.gap_pct}%) · Tier-3 cross-check`} style={{cursor:'help',background:T.reconciliation.status==='verified'?'var(--green-soft)':'var(--orange-soft)',color:T.reconciliation.status==='verified'?'var(--green)':'var(--orange)'}}>{T.reconciliation.status==='verified'?'✓ Verified':'⚠ Degraded'} vs DefiLlama</span>}
          <span className="risk-pill" style={{background:'var(--bg-2)',color:'var(--fg-muted)'}}>Scope · Horizon</span>
        </>
      );
      const METRIC_LABELS = {value:'Total RWA Value', holders:'Asset Holders', active:'Active Addresses', transfer:'Transfer Volume'};
      // ── Event-indexer metrics (Envio): holders / active addrs / transfer volume ──
      const evBy = (events && events.by_asset) || {};
      const evFor = (r) => evBy[(r.address||'').toLowerCase()] || {};
      const volUsd = (r) => { const e=evFor(r), dec=r.decimals||18; const tok=['supplied','withdrawn','borrowed','repaid'].reduce((s,k)=>s+Number(e[k]||0),0)/Math.pow(10,dec); return tok*(r.oracle_price_usd||1); };
      const metricVal = (r,m) => m==='holders'?(evFor(r).holders||0) : m==='active'?(evFor(r).active||0) : m==='transfer'?volUsd(r) : 0;
      const metricRows = (m) => [...reserves].map(r=>({name:r.label, value:metricVal(r,m), dot:CLASS_COLORS[r.asset_class]||'var(--orange)'})).filter(x=>x.value>0).sort((a,b)=>b.value-a.value);
      const holderRows = metricRows('holders');
      const cnt = (v)=>window.fmtNum(v,0);
      const metricNote = {holders:'current holders per fund', active:'distinct addresses since genesis'};
      // Holders / Active → stacked bar (one bar per fund, segment coloured by asset class)
      const allClassNames = [...new Set(reserves.map(r=>r.asset_class))];
      const clsByLabel = {}; reserves.forEach(r=>{ clsByLabel[r.label]=r.asset_class; });
      const barData = (m) => {
        const rows = metricRows(m);
        const data = rows.map(x=>{ const o={}; allClassNames.forEach(c=>o[c]=0); o[clsByLabel[x.name]]=x.value; return o; });
        return { data, keys: allClassNames, colors: allClassNames.map(c=>CLASS_COLORS[c]||'#9599A1'), labels: rows.map(x=>x.name) };
      };
      const barLegend = (m) => { const seen=new Set(); metricRows(m).forEach(x=>seen.add(clsByLabel[x.name])); return [...seen]; };
      // Transfer Volume → daily stacked-area time series in USD (like the Value chart)
      const decOf={}, priceOf={}; reserves.forEach(r=>{ const a=(r.address||'').toLowerCase(); decOf[a]=r.decimals||18; priceOf[a]=r.oracle_price_usd||1; });
      const txDays = (flows&&flows.daily) ? Object.keys(flows.daily).sort() : [];
      const txByDayClass = {};
      txDays.forEach(d=>{ const cm={}; Object.entries(flows.daily[d]).forEach(([res,tok])=>{ const cls=classOf[res]; if(!cls)return; const usd=(Number(tok)/Math.pow(10,decOf[res]||18))*(priceOf[res]||1); cm[cls]=(cm[cls]||0)+usd; }); txByDayClass[d]=cm; });
      const txSeries = txDays.length>1 ? allClassNames.map(cls=>({ name:cls, color:CLASS_COLORS[cls]||'#9599A1', values: txDays.map(d=>txByDayClass[d]?.[cls]||0) })).filter(s=>s.values.some(v=>v>0)) : [];
      const txLabels = txDays.map(s=>{ const dt=new Date(s+'T00:00:00Z'); return dt.toLocaleDateString('en-US',{month:'short',year:'2-digit'}); });
      // Holders / Active Addresses trend lines (stacked area by class, backfilled from genesis)
      const trendFrom = (pts) => {
        if(!pts || pts.length<2) return { series:[], labels:[] };
        const classes=[...new Set(pts.flatMap(p=>Object.keys(p.byClass||{})))];
        const series=classes.map(cls=>({ name:cls, color:CLASS_COLORS[cls]||'#9599A1', values:pts.map(p=>(p.byClass&&p.byClass[cls])||0) })).filter(s=>s.values.some(v=>v>0));
        const labels=pts.map(p=>{ const dt=new Date(p.d+'T00:00:00Z'); return dt.toLocaleDateString('en-US',{month:'short',year:'2-digit'}); });
        return { series, labels };
      };
      const holdersTrend = trendFrom(holdersHist);
      const activeTrend = trendFrom(activeHist);
      // 30d delta from a history points array ([{d,total}])
      const hist30 = (pts) => {
        if(!pts || pts.length<2) return null;
        const last=pts[pts.length-1];
        const target=new Date(new Date(last.d+'T00:00:00Z').getTime()-30*864e5).toISOString().slice(0,10);
        let prev=null; for(const p of pts){ if(p.d<=target) prev=p; else break; }
        if(!prev) return null;
        const cur=Number(last.total), old=Number(prev.total);
        return (old>0&&isFinite(cur))?(cur-old)/old*100:null;
      };
      const holdersDelta = hist30(holdersHist);
      const activeDelta = hist30(activeHist);
      const cntFmt = (v)=>window.fmtNum(v,0);
      // per-metric headline (current total + 30d delta) shown above the chart

        value:   { val: navUSD(T.rwa_aum), delta: rwaDelta, sub: 'RWA AUM' },

        active:  { val: activeHist&&activeHist.length?cntFmt(activeHist[activeHist.length-1].total):(events&&events.totals?cntFmt(events.totals.active_addresses):'n/a'), delta: activeDelta, sub: 'active addresses' },

                  <span className="panel-badge">{morphoMarkets.length} MARKETS{morpho&&morpho.avg_lltv!=null?` · AVG LLTV ${pct(morpho.avg_lltv,0)}`:''}</span>
                </div>
                <div className="panel-caption"><b>A different risk model.</b> Morpho markets are <b>isolated</b>: each pairs one RWA collateral with one loan asset at a fixed LLTV and oracle, so there's no shared-pool NAV grade; the risk is per-market. LLTV is the liquidation point; high utilization means thin exit liquidity if it unwinds.</div>
                <div className="panel-body flush">
                  {!morpho ? (
                    <div style={{padding:'28px 16px',fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-muted)'}}>Loading Morpho markets…</div>
                  ) : (
                  <table className="datatable">
                    <thead><tr><th>Collateral &rarr; Loan</th><th>Class</th><th className="num">LLTV</th><th className="num col-hide-sm">Liq. Incentive</th><th className="num">Borrowed $</th><th className="num">Utilization</th><th className="num col-hide-sm">Borrow APY</th><th className="col-hide-sm">Oracle</th></tr></thead>
                    <tbody>
                      {morphoMarkets.map((m,i)=>{
                        const col=CLASS_COLORS[m.asset_class]||'var(--fg-muted)';
                        const lltvHi=m.lltv!=null&&m.lltv>=0.95;
                        const utilHi=m.utilization>=0.95;
                        return (<tr key={i}>
                          <td><div className="asset"><div className="asset-icon" style={{background:col}}>{(m.collateral_symbol||'?').slice(0,2)}</div><div><div className="asset-name">{m.collateral_symbol} <span style={{color:'var(--fg-dim)'}}>&rarr;</span> {m.loan_symbol}</div><div className="asset-sub">{m.issuer}</div></div></div></td>
                          <td><span className="risk-pill" style={{background:'var(--bg-2)',color:'var(--fg-muted)'}}><span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:col,marginRight:6,verticalAlign:'middle'}}/>{m.asset_class}</span></td>
                          <td className="num"><div style={{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:7}}><span style={{fontWeight:600,color:lltvHi?'var(--orange)':'var(--fg)'}}>{pct(m.lltv,0)}</span><span style={{width:30,height:5,background:'var(--bg-2)',borderRadius:3,overflow:'hidden',display:'inline-block'}}><span style={{display:'block',height:'100%',width:pct(m.lltv,0),background:lltvHi?'var(--orange)':col}}/></span></div></td>
                          <td className="num col-hide-sm" style={{color:'var(--fg-muted)'}}>+{((m.liq_incentive-1)*100).toFixed(1)}%</td>
                          <td className="num">{navUSD(m.borrow_usd)}</td>
                          <td className="num"><span style={{color:utilHi?'var(--orange)':'var(--fg-muted)'}}>{pct(m.utilization,0)}</span></td>
                          <td className="num col-hide-sm" style={{color:'var(--green)'}}>{pct(m.borrow_apy,1)}</td>
                          <td className="col-hide-sm"><span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-dim)'}}>{shortAddr(m.oracle)}</span></td>
                        </tr>);
                      })}
                    </tbody>
                  </table>
                  )}
                </div>
              </div>
            </>}

            {view==='activity' && (()=>{ const am=['holders','active','transfer'].includes(metric)?metric:'holders';
              const stableAddrs=new Set(reserves.filter(r=>r.is_stable).map(r=>(r.address||'').toLowerCase()));
              const uTokens=usage?usage.tokens.filter(t=>!stableAddrs.has((t.address||'').toLowerCase())):[];
              const PROTO_COLORS={'Aave Horizon':'#B6509E','Morpho':'#2C6BED','Held elsewhere':'#C2C7D0'};
              const uAgg={}; uTokens.forEach(t=>{for(const [p,v] of Object.entries(t.composition||{})) uAgg[p]=(uAgg[p]||0)+v;});
              const uPie=Object.entries(uAgg).map(([name,value])=>({name,value,color:PROTO_COLORS[name]||'#9599A1'})).sort((a,b)=>b.value-a.value);
              const uTotal=uTokens.reduce((s,t)=>s+(t.total_usd||0),0);
              const uDeployed=uTokens.reduce((s,t)=>s+(t.deployed_usd||0),0);
              return (<>
              <div className="panel" style={{marginBottom:16}}>
                <div className="panel-header">
                  <span className="panel-title"><span className="bullet">●</span> Where it's used<span style={{color:'var(--fg-dim)',fontWeight:400,marginLeft:8,textTransform:'none',letterSpacing:0}}>· utilisation across DeFi</span></span>
                  <span className="panel-badge">{uTokens.length} assets · {usage?usage.registry_count:0} labeled venues</span>
                </div>
                <div className="panel-caption"><b>Where does each RWA's supply actually sit?</b> We read the token's on-chain balance held by labeled protocol contracts (lending, DEX, perps, vaults) and treat the rest as held elsewhere. This is utilisation: how much of a token is truly deployed as collateral vs parked in wallets. <i>Coverage grows as venues are labeled; "held elsewhere" = wallets plus venues not yet in the registry.</i></div>
                <div className="panel-body">
                  {!usage ? (
                    <div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-muted)',padding:'12px 0'}}>Loading usage…</div>
                  ) : (
                  <div className="grid grid-2" style={{alignItems:'center',gap:20}}>
                    <div style={{display:'flex',alignItems:'center'}}><Donut items={uPie} size={185} formatter={navUSD} /></div>
                    <div>
                      <div style={{fontSize:30,fontWeight:600,letterSpacing:'-0.02em'}}>{uTotal>0?Math.round(uDeployed/uTotal*100):0}%</div>
                      <div style={{fontSize:13,color:'var(--fg-muted)',marginTop:4,lineHeight:1.5}}>of tracked RWA value is <b style={{color:'var(--fg)'}}>deployed in a labeled venue</b> ({navUSD(uDeployed)} of {navUSD(uTotal)}). The rest is held in wallets or venues not yet in the registry.</div>
                    </div>
                  </div>
                  )}
                </div>
                {usage && <div className="panel-body flush" style={{borderTop:'1px solid var(--border)'}}>
                  <table className="datatable">
                    <thead><tr><th>Asset</th><th className="num">Total Value</th><th className="num">Deployed</th><th>Composition</th><th className="num col-hide-sm">In venues</th></tr></thead>
                    <tbody>
                      {uTokens.map((t,i)=>(
                        <tr key={i}>
                          <td><div className="asset"><div className="asset-icon" style={{background:CLASS_COLORS[t.asset_class]||'var(--fg-muted)'}}>{(t.symbol||'?').slice(0,2)}</div><div><div className="asset-name">{t.symbol}</div><div className="asset-sub">{t.asset_class}</div></div></div></td>
                          <td className="num" style={{fontWeight:600}}>{navUSD(t.total_usd)}</td>
                          <td className="num"><span style={{fontWeight:600,color:t.deployed_pct>=0.5?'var(--green)':'var(--fg)'}}>{Math.round(t.deployed_pct*100)}%</span></td>
                          <td><div style={{display:'flex',height:8,borderRadius:4,overflow:'hidden',background:'var(--bg-2)',minWidth:110,maxWidth:240}}>{['Aave Horizon','Morpho','Held elsewhere'].map(p=>{const v=t.composition[p]||0;const w=t.total_usd>0?v/t.total_usd*100:0;return w>0.3?<span key={p} title={p+': '+navUSD(v)} style={{width:w+'%',background:PROTO_COLORS[p]||'#9599A1'}}/>:null;})}</div></td>
                          <td className="num col-hide-sm" style={{color:'var(--fg-muted)'}}>{navUSD(t.deployed_usd)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>}
              </div>

              <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--fg-dim)',letterSpacing:'0.08em',textTransform:'uppercase',margin:'0 2px 10px'}}>On-chain activity · Aave Horizon</div>
              <div className="grid grid-4" style={{marginBottom:16}}>
                <Metric label="Asset Holders" value={events&&events.totals?window.fmtNum(events.totals.holders,0):'n/a'} delta={holdersDelta} sub="across funds" />
                <Metric label="Active Addresses" value={events&&events.totals?window.fmtNum(events.totals.active_addresses,0):'n/a'} delta={activeDelta} sub="distinct since genesis" />
                <Metric label="Actions" value={events&&events.totals?window.fmtNum(events.totals.actions,0):'n/a'} sub="supply / withdraw / borrow / repay" />
                <Metric label="Indexer" value="Live" sub={events&&events.synced_block?`synced #${Number(events.synced_block).toLocaleString()}`:'Envio HyperIndex'} />
              </div>
              <div className="panel" ref={chartRef}>
                <div className="panel-header">
                  <span className="panel-title">{ {holders:'Asset Holders',active:'Active Addresses',transfer:'Transfer Volume'}[am] }<span style={{color:'var(--fg-dim)',fontWeight:400,marginLeft:8,textTransform:'none',letterSpacing:0}}>· over time, by category · Aave Horizon</span></span>
                  <div className="time-range">{['holders','active','transfer'].map(m=>(<button key={m} className={am===m?'active':''} onClick={()=>setMetric(m)}>{ {holders:'Holders',active:'Active Addrs',transfer:'Transfer Vol'}[m] }</button>))}</div>
                </div>
                <div className="panel-caption">Is this RWA actually <b>used</b>, or just parked? Holders, active addresses and transfer flows are the <b>usage</b> half of the collateral story; a thin, inactive holder base is itself a risk signal. (Aave Horizon, via the Envio indexer.)</div>
                <div className="panel-body">
                  <div style={{display:'flex',alignItems:'baseline',gap:12,marginBottom:14,flexWrap:'wrap'}}>
                    <span style={{fontSize:26,fontWeight:600,letterSpacing:'-0.02em'}}>{headline[am].val}</span>
                    <Delta pct={headline[am].delta} />
                    <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-dim)'}}>{headline[am].sub}</span>
                  </div>
                  <div ref={chartWrapRef} style={{width:'100%'}}>
                    {am==='transfer'
                      ? (txSeries.length ? <AreaChart series={txSeries} stacked width={CW} height={CH} labels={txLabels} formatter={window.fmtUSD} /> : <div style={{height:CH,display:'grid',placeItems:'center'}}><span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-muted)'}}>Loading transfer volume…</span></div>)
                      : am==='holders'
                        ? (holdersTrend.series.length ? <AreaChart series={holdersTrend.series} stacked width={CW} height={CH} labels={holdersTrend.labels} formatter={cntFmt} /> : <div style={{height:CH,display:'grid',placeItems:'center'}}><span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-muted)'}}>Holder history syncing…</span></div>)
                        : (activeTrend.series.length ? <AreaChart series={activeTrend.series} stacked width={CW} height={CH} labels={activeTrend.labels} formatter={cntFmt} /> : <div style={{height:CH,display:'grid',placeItems:'center'}}><span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-muted)'}}>Loading…</span></div>)}
                  </div>
                </div>
              </div>
            </>);})()}
          </main>

          <footer className="statusbar">
            <div className="left"><span style={{color:'var(--orange)'}}>❯</span><span>rwa-terminal</span><span className="sep">│</span><span>source: <span style={{color:'var(--green)'}}>onchain + issuer APIs</span></span><span className="sep">│</span><span>Phase 1</span></div>
            <div className="right"><span>block #{D.block.toLocaleString()}</span><span className="sep">│</span><span>Powered by DatumLabs</span></div>
          </footer>

          <AssetDrawer asset={sel} onClose={()=>setSel(null)} />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <div id="splash" class="boot-splash" style="z-index:99999"><img class="boot-splash-mark" src="assets/brand/datum-loop.webp" alt="Datum Labs" /></div>
  <script>(function(){var s=document.getElementById('splash');if(!s)return;if(sessionStorage.getItem('rwaSplash')){s.remove();return;}sessionStorage.setItem('rwaSplash','1');setTimeout(function(){s.style.transition='opacity .45s ease';s.style.opacity='0';setTimeout(function(){s.remove();},450);},5000);})();</script>
</body>
</html>
