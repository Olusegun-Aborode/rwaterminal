<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RWA Terminal: Morpho (live)</title>
  <link rel="stylesheet" href="styles.css?v=p7-thesis" />
</head>
<body data-theme="light" data-aesthetic="institutional" data-density="cozy">
  <script>(function(){try{var t=localStorage.getItem('theme');if(t)document.body.setAttribute('data-theme',t);}catch(e){}})();</script>
  <div id="root" class="shell">
    <div class="boot-splash"><img class="boot-splash-mark" src="assets/brand/datum-loop.webp" alt="Datum Labs" /></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <script type="text/babel" data-presets="env,react">
    const WORKER_URL = "https://rwa-terminal-worker.aborodeolusegun.workers.dev";
    const CLASS_COLORS = { 'Private Credit':'#FF6B35', 'Private Credit (CLO)':'#9B4AE0', 'US Treasuries':'#3B5FE0', 'Bonds':'#0090B2', 'Govt Bonds (EU)':'#5B8DEF', 'Commodities (Gold)':'#D4A017', 'Other':'#9599A1' };
    const money = (n) => n==null ? 'n/a' : (Math.abs(n)>=1e9?'$'+(n/1e9).toFixed(2)+'B':Math.abs(n)>=1e6?'$'+(n/1e6).toFixed(2)+'M':Math.abs(n)>=1e3?'$'+(n/1e3).toFixed(1)+'K':'$'+Number(n).toFixed(2));
    const pct = (n,d=1) => n==null ? 'n/a' : (n*100).toFixed(d)+'%';
    const shortAddr = (a) => a ? a.slice(0,6)+'…'+a.slice(-4) : 'n/a';

    function KPI({label, value, sub}) {
      return (
        <div className="panel" style={{padding:'18px 20px'}}>
          <div className="metric-label">{label}</div>
          <div className="metric-value" style={{fontSize:28,marginTop:6}}>{value}</div>
          {sub && <div className="metric-footer" style={{marginTop:6}}>{sub}</div>}
        </div>
      );
    }

    function App() {
      const [M, setM] = React.useState(null);
      React.useEffect(() => {
        let alive = true; const base = WORKER_URL.replace(/\/$/,'');
        const load = () => fetch(base+'/api/morpho').then(r=>r.json()).then(j=>{ if(alive && j && j.assets) setM(j); }).catch(()=>{});
        load(); const id = setInterval(load, 120000);
        return () => { alive = false; clearInterval(id); };
      }, []);
      const [tier, setTier] = React.useState('all');
      const allAssets = M ? M.assets : [];
      const assets = tier==='all' ? allAssets : allAssets.filter(a=>a.tier==='fund');
      const total = assets.reduce((s,a)=>s+(a.morpho_usd||0),0);
      const allMarkets = M ? (M.collateral_markets||[]) : [];
      const markets = tier==='all' ? allMarkets : allMarkets.filter(m=>m.tier==='fund');
      const totalBorrow = markets.reduce((s,m)=>s+(m.borrow_usd||0),0);
      const totalColl = markets.reduce((s,m)=>s+(m.collateral_usd||0),0);
      const lltvVals = markets.map(m=>m.lltv).filter(v=>v!=null);
      const avgLltv = lltvVals.length ? lltvVals.reduce((s,v)=>s+v,0)/lltvVals.length : null;
      const byClass = (()=>{ const bc={}; assets.forEach(a=>{bc[a.asset_class]=(bc[a.asset_class]||0)+a.morpho_usd}); return Object.entries(bc).map(([name,usd])=>({name,usd})).sort((a,b)=>b.usd-a.usd); })();
      const top = byClass[0];
      const asOf = M ? new Date(M.fetched_at*1000) : null;

      const Side = (
        <aside className="sidebar">
          <div className="sidebar-section-label">Market</div>
          <a className="nav-item" href="index.html"><span className="nav-icon">◆</span><span>Overview</span></a>
          <div className="sidebar-section-label">Analytics</div>
          <a className="nav-item" href="index.html#risk"><span className="nav-icon">◈</span><span>Risk &amp; Quality</span></a>
          <a className="nav-item" href="index.html#activity"><span className="nav-icon">❑</span><span>RWA Utilisation</span></a>
          <div className="sidebar-section-label">Venues</div>
          <a className="nav-item" href="horizon.html"><span className="nav-icon">▦</span><span>Aave Horizon</span></a>
          <a className="nav-item active"><span className="nav-icon">▦</span><span>Morpho</span><span className="nav-count">{M?M.asset_count:''}</span></a>
          <div className="sidebar-section-label">Workspace</div>
          <a className="nav-item" href="methodology.html"><span className="nav-icon">𝑓</span><span>Methodology</span></a>
          <div style={{marginTop:'auto',padding:'16px 10px 8px',borderTop:'1px solid var(--border)'}}>
            <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--fg-dim)',letterSpacing:'0.1em'}}>BUILT WITH</div>
            <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-muted)',marginTop:3}}>@datumlabs/<span style={{color:'var(--orange)'}}>dashboard-kit</span></div>
          </div>
        </aside>
      );

      return (
        <>
          <header className="topbar">
            <div className="topbar-left">
              <div className="topbar-brand"><img src="assets/brand/datum-loop.webp" style={{width:22,height:22,borderRadius:4,objectFit:'cover'}}/><span className="topbar-brand-name">datum<span style={{color:'var(--orange)'}}>labs</span></span></div>
              <span className="topbar-terminal"><span className="prompt">❯</span><span>rwa-terminal · venue: morpho</span></span>
            </div>
            <div className="topbar-right">
              <span className="live-pill"><span className="dot"/>LIVE{asOf?` · ${asOf.toUTCString().slice(17,25)} UTC`:''}</span>
            </div>
          </header>

          {Side}

          <main className="main">
            <div className="page-header">
              <div>
                <h1 className="page-title">Morpho: RWA on Morpho</h1>
                <div className="page-subtitle"><b>How RWA behaves as collateral on Morpho's isolated lending markets.</b> Each market sets its own LLTV, oracle and liquidation terms, so venue-level totals hide the real risk. Lens: token value locked per market (collateral or supplied). Source: Morpho GraphQL API.{asOf?` · ${asOf.toUTCString()}`:''}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                <div className="time-range">
                  <button className={tier==='all'?'active':''} onClick={()=>setTier('all')} title="All curated RWA on Morpho: tokenized funds + RWA-backed dollars (Maple, Ethena, gold)">All RWA</button>
                  <button className={tier==='fund'?'active':''} onClick={()=>setTier('fund')} title="Discrete tokenized funds only (Horizon-parity): Midas, Centrifuge, Spiko">Tokenized funds</button>
                </div>
                <span className="risk-pill" style={{background:'var(--bg-2)',color:'var(--fg-muted)',whiteSpace:'nowrap'}}>Scope · Morpho · Phase 2</span>
              </div>
            </div>

            {!M ? (
              <div className="panel" style={{padding:48,textAlign:'center'}}><div style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--fg-muted)'}}>Loading Morpho RWA…</div></div>
            ) : (
            <>
            <div className="grid grid-4" style={{marginBottom:16}}>
              <KPI label="RWA on Morpho" value={money(total)} sub={`${assets.length} assets · ${tier==='all'?'all RWA':'tokenized funds'}`} />
              <KPI label="Borrowed vs RWA" value={money(totalBorrow)} sub={`across ${markets.length} collateral markets`} />
              <KPI label="Avg LLTV" value={avgLltv!=null?pct(avgLltv,0):'n/a'} sub="liquidation loan-to-value" />
              <KPI label="Largest Class" value={top?money(top.usd):'n/a'} sub={top?top.name:''} />
            </div>

            <div className="panel" style={{marginBottom:16}}>
              <div className="panel-header"><span className="panel-title"><span className="bullet">●</span> RWA Assets on Morpho</span><span className="panel-badge">{assets.length} ASSETS · LIVE</span></div>
              <div className="panel-caption">The curated RWA tokens active on Morpho and <b>how each is used</b>: as collateral (borrow against it) or supplied (lent out). Per-market liquidation terms are in the table below.</div>
              <div className="panel-body flush">
                <table className="datatable">
                  <thead><tr><th>Asset</th><th>What it is</th><th>Class</th><th>Issuer</th><th className="num">On Morpho</th><th>Lens</th><th className="num">Markets</th></tr></thead>
                  <tbody>
                    {assets.map((a,i)=>(
                      <tr key={i}>
                        <td><div className="asset"><div className="asset-icon" style={{background:CLASS_COLORS[a.asset_class]||'var(--fg-muted)'}}>{a.label.slice(0,2)}</div><div><div className="asset-name">{a.label}</div><div className="asset-sub">{(a.address||'').slice(0,8)}…</div></div></div></td>
                        <td style={{color:'var(--fg-muted)',fontSize:12,maxWidth:240}}>{a.what}</td>
                        <td><span className="risk-pill" style={{background:'var(--bg-2)',color:'var(--fg-muted)'}}><span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:CLASS_COLORS[a.asset_class]||'var(--fg-dim)',marginRight:6,verticalAlign:'middle'}}/>{a.asset_class}</span></td>
                        <td style={{color:'var(--fg-muted)',fontSize:12}}>{a.issuer}</td>
                        <td className="num" style={{fontWeight:600}}>{money(a.morpho_usd)}</td>
                        <td style={{fontSize:12,color:'var(--fg-muted)'}}>{a.role==='collateral'?'as collateral':'supplied (lent)'}</td>
                        <td className="num" style={{color:'var(--fg-muted)'}}>{a.markets}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="panel" style={{marginBottom:16}}>
              <div className="panel-header">
                <span className="panel-title"><span className="bullet">●</span> RWA Collateral Markets: liquidation parameters</span>
                <span className="panel-badge">{markets.length} MARKETS · LIVE</span>
              </div>
              <div className="panel-caption">
                Each Morpho market is <b>isolated</b> (one collateral, one loan asset, fixed LLTV &amp; oracle). LLTV is the liquidation loan-to-value; above it, a position is liquidatable at the liquidation incentive shown. <b>This is the per-market risk that aggregate venue numbers hide.</b>
              </div>
              <div className="panel-body flush">
                <table className="datatable">
                  <thead><tr>
                    <th>Collateral &rarr; Loan</th><th>Class</th>
                    <th className="num">LLTV</th><th className="num col-hide-sm">Liq. Incentive</th>
                    <th className="num">Collateral $</th><th className="num">Borrowed $</th>
                    <th className="num">Utilization</th><th className="num">Borrow APY</th>
                    <th className="col-hide-sm">Oracle</th>
                  </tr></thead>
                  <tbody>
                    {markets.map((m,i)=>{
                      const col = CLASS_COLORS[m.asset_class]||'var(--fg-muted)';
                      const lltvHi = m.lltv!=null && m.lltv>=0.95;
                      return (<tr key={i}>
                        <td><div className="asset"><div className="asset-icon" style={{background:col}}>{m.collateral_symbol.slice(0,2)}</div><div><div className="asset-name">{m.collateral_symbol} <span style={{color:'var(--fg-dim)'}}>&rarr;</span> {m.loan_symbol}</div><div className="asset-sub">{m.issuer}</div></div></div></td>
                        <td><span className="risk-pill" style={{background:'var(--bg-2)',color:'var(--fg-muted)'}}><span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:col,marginRight:6,verticalAlign:'middle'}}/>{m.asset_class}</span></td>
                        <td className="num"><div style={{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:7}}><span style={{fontWeight:600,color:lltvHi?'var(--orange)':'var(--fg)'}}>{pct(m.lltv,0)}</span><span style={{width:32,height:5,background:'var(--bg-2)',borderRadius:3,overflow:'hidden',display:'inline-block'}}><span style={{display:'block',height:'100%',width:pct(m.lltv,0),background:lltvHi?'var(--orange)':col}}/></span></div></td>
                        <td className="num col-hide-sm" style={{color:'var(--fg-muted)'}}>+{((m.liq_incentive-1)*100).toFixed(1)}%</td>
                        <td className="num" style={{fontWeight:600}}>{money(m.collateral_usd)}</td>
                        <td className="num">{money(m.borrow_usd)}</td>
                        <td className="num"><span style={{color:m.utilization>=0.95?'var(--orange)':'var(--fg-muted)'}}>{pct(m.utilization,0)}</span></td>
                        <td className="num" style={{color:'var(--green)'}}>{pct(m.borrow_apy,1)}</td>
                        <td className="col-hide-sm"><span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-dim)'}}>{shortAddr(m.oracle)}</span></td>
                      </tr>);
                    })}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="panel">
              <div className="panel-header"><span className="panel-title"><span className="bullet">●</span> By Asset Class</span><span className="panel-badge">{byClass.length} CLASSES</span></div>
              <div className="panel-body">
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {byClass.map((c,i)=>{const max=byClass[0].usd;return(
                    <div key={i}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:12}}>
                        <span style={{display:'flex',alignItems:'center',gap:8}}><span style={{width:8,height:8,borderRadius:'50%',background:CLASS_COLORS[c.name]||'var(--fg-dim)',display:'inline-block'}}/><span style={{fontWeight:500}}>{c.name}</span></span>
                        <span style={{fontFamily:'var(--font-mono)',color:'var(--fg-muted)'}}>{money(c.usd)}</span>
                      </div>
                      <div style={{height:6,background:'var(--bg-2)',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:`${c.usd/max*100}%`,background:CLASS_COLORS[c.name]||'var(--fg-muted)',borderRadius:3}}/></div>
                    </div>
                  );})}
                </div>
              </div>
            </div>
            </>
            )}
          </main>

          <footer className="statusbar">
            <div className="left"><span style={{color:'var(--orange)'}}>❯</span><span>rwa-terminal</span><span className="sep">│</span><span>source: <span style={{color:'var(--green)'}}>Morpho API (live)</span></span><span className="sep">│</span><span>Phase 2 · Morpho</span></div>
            <div className="right"><span>Powered by DatumLabs</span></div>
          </footer>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <div id="splash" class="boot-splash" style="z-index:99999"><img class="boot-splash-mark" src="assets/brand/datum-loop.webp" alt="Datum Labs" /></div>
  <script>(function(){var s=document.getElementById('splash');if(!s)return;if(sessionStorage.getItem('rwaSplash')){s.remove();return;}sessionStorage.setItem('rwaSplash','1');setTimeout(function(){s.style.transition='opacity .45s ease';s.style.opacity='0';setTimeout(function(){s.remove();},450);},5000);})();</script>
</body>
</html>
